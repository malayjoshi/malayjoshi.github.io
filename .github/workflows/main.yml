name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'flask-app/**'

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        working-directory: ./flask-app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Unit Tests
        working-directory: ./flask-app
        run: |
          export PYTHONPATH=$PWD
          pytest
      

      - name: Copy Application Files to GCP VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_PASSPHRASE }}
          source: "flask-app/*"
          target: "/home/deploy-nginx"

      - name: Deploy Application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_PASSPHRASE }}
          script: |
            cd /home/deploy-nginx/flask-app

            echo "Stopping existing containers..."
            docker compose down || true

            echo "Tagging current image for rollback..."
            docker tag sample-app sample-app:previous || true

            echo "Building Docker image..."
            docker compose build

            echo "Starting application..."
            docker compose up -d

            echo "Waiting for application startup..."
            sleep 10

      - name: Health Check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_PASSPHRASE }}
          script: |
            echo "Checking application health..."

            curl -f http://localhost:8030/health

      - name: Rollback on Failure
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_PASSPHRASE }}
          script: |
            echo "Deployment failed. Rolling back..."

            docker compose down || true

            docker stop sample-app || true
            docker rm sample-app || true

            docker run -d \
              --name sample-app \
              --restart unless-stopped \
              -p 127.0.0.1:8030:8030 \
              sample-app:previous || echo "No previous image available."
